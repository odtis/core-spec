composition_rules:
- Reliance Extensions MUST NOT weaken Core, Trust Network, Federation, or Operator requirements (ODTIS-0707)
- Every reliance sub-module specializes the R-Base schema (ODTIS-0701..0708)
- Conformance statements MUST list active reliance sub-modules and deployment phase (ODTIS-0708)
- Tier 2/3 sub-modules are preview; tier 1 are draft toward ODTIS 1.x
