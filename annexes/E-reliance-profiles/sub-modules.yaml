# ODTIS Annex E - Reliance Extension sub-modules (Capa B governance overlays)
# Source: manuelmerida.io DTI editorial feed (The DTI problem series)

spec_version: "0.9.0-draft"
profile_id: reliance-extensions
depends_on: [core-identity]
normative_annex: true
status: normative-v0.9

