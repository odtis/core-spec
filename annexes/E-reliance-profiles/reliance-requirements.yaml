# ODTIS Annex E - Reliance Extension requirements (catalog mirror of registry)
spec_version: "0.9.0-draft"
merge_target: registry/requirements.json
status: normative

requirements:
R-Base:
- id: ODTIS-0701
  keyword: MUST
  text: "A reliance decision under any Reliance Extension MUST identify the relying party and its registered role before a trust signal is acted upon."
  status: normative
- id: ODTIS-0702
  keyword: MUST
  text: "Each reliance decision MUST bind a declared purpose to every attribute or verdict consumed; use outside the declared purpose MUST be refused."
  status: normative
- id: ODTIS-0703
  keyword: MUST
  text: "Each reliance decision MUST carry assurance metadata (assurance level and method) sufficient for the relying party risk tier."
  status: normative
- id: ODTIS-0704
  keyword: MUST
  text: "Each reliance decision MUST emit a tamper-evident audit evidence reference that a supervisor can reconstruct after the fact."
  status: normative
- id: ODTIS-0705
  keyword: MUST
  text: "Each Reliance Extension MUST define a recourse path for contested, failed, or wrongful decisions."
  status: normative
- id: ODTIS-0706
  keyword: MUST
  text: "Each Reliance Extension MUST define revocation and step-up triggers where the underlying trust signal can change state."
  status: normative
- id: ODTIS-0707
  keyword: MUST NOT
  text: "A Reliance Extension MUST NOT weaken or relax any Core Identity, Trust Network, Federation, or Operator requirement."
  status: normative
- id: ODTIS-0708
  keyword: MUST
  text: "A conformance statement claiming Reliance Extensions MUST list each active sub-module and its deployment phase."
  status: normative
R-Agent-Authority:
- id: ODTIS-0710
  keyword: MUST
  text: "An agent reliance decision MUST resolve a verifiable agent identifier bound to a named principal and an accountable human or organizational sponsor."
  status: normative
- id: ODTIS-0711
  keyword: MUST
  text: "Delegated agent authority MUST be expressed as a signed mandate with allowed actions, prohibited actions, and value/time/session limits; each delegation hop MUST narrow scope and MUST NOT escalate privilege."
  status: normative
- id: ODTIS-0712
  keyword: MUST
  text: "A relying party MUST verify agent mandate revocation status within a declared freshness window before honoring a high-risk action, and MUST fail closed when status cannot be confirmed."
  status: normative
- id: ODTIS-0713
  keyword: SHOULD
  text: "High-risk agent actions such as financial disbursement, identity changes, or regulatory filings SHOULD require an explicit human-anchor reference and step-up in the delegation chain."
  status: normative
R-Crypto-Agility:
- id: ODTIS-0715
  keyword: MUST
  text: "A long-lived credential profile MUST publish its algorithm set, hybrid status, and a documented rotation policy and deprecation trigger."
  status: normative
- id: ODTIS-0716
  keyword: MUST
  text: "Relying-party acceptance criteria MUST be declared for classical, hybrid, and post-quantum assertion paths, with audit evidence retained per accepted path."
  status: normative
- id: ODTIS-0717
  keyword: SHOULD
  text: "Issuers SHOULD maintain a cryptographic bill of materials (CBOM) and classify harvest-now-decrypt-later exposure by credential validity and data sensitivity."
  status: normative
R-Lifecycle-Revocation:
- id: ODTIS-0719
  keyword: MUST
  text: "An identity lifecycle program MUST record both claimed and observed revocation SLA across every credential system that must fire on offboarding."
  status: normative
- id: ODTIS-0720
  keyword: MUST
  text: "Revocation evidence MUST unify physical and digital credential status into a reconstructable audit reference per lifecycle event."
  status: normative
- id: ODTIS-0721
  keyword: SHOULD
  text: "Operators SHOULD scan for orphan credentials and active sessions at defined intervals after a subject exit."
  status: normative
R-Document-Capture:
- id: ODTIS-0723
  keyword: MUST
  text: "A document verification reliance decision MUST declare capture mode (live SDK, upload, or hybrid) and the injection-detection and document-forensics tiers in scope."
  status: normative
- id: ODTIS-0724
  keyword: MUST
  text: "Reusable document verification outcomes MUST carry capture-channel integrity and device/session risk evidence; upload-only paths MUST be policy-gated by risk tier."
  status: normative
- id: ODTIS-0725
  keyword: SHOULD
  text: "Verification providers SHOULD disclose lab-versus-production validation metrics and define a fraud recourse and SAR escalation path."
  status: normative
R-Liveness:
- id: ODTIS-0727
  keyword: MUST
  text: "A liveness reliance decision MUST declare the liveness provider, challenge type, identity-linkage class, and retention policy."
  status: normative
- id: ODTIS-0728
  keyword: MUST NOT
  text: "A human-presence (liveness) verdict MUST NOT be reused outside its declared purpose, and MUST NOT be treated as identity proof or statutory age proof without explicit authorization."
  status: normative
- id: ODTIS-0729
  keyword: MUST
  text: "Liveness reliance MUST provide an accessible non-camera fallback of equivalent outcome and a recourse path for false rejection."
  status: normative
R-Disclosure-Assurance:
- id: ODTIS-0731
  keyword: MUST
  text: "Audience-bound audit disclosure MUST define per-relying-party-role disclosure sets bound to purpose, with prohibited fields enumerated per tier."
  status: normative
- id: ODTIS-0732
  keyword: MUST
  text: "A verifier MUST be able to reconstruct a disclosed verdict offline from the registered evidence and the authorized disclosure set alone."
  status: normative
- id: ODTIS-0733
  keyword: MUST
  text: "A demand for fields outside the authorized disclosure set MUST be refused and MUST trigger a documented recourse path."
  status: normative
R-Assurance-Portability:
- id: ODTIS-0743
  keyword: MUST
  text: "A reusable verification outcome MUST carry portable assurance metadata: proofing level and method, PAD and IAD coverage, and capture-channel integrity."
  status: normative
- id: ODTIS-0744
  keyword: MUST
  text: "A relying party MUST evaluate step-up requirements against its own risk tier before reusing assurance, rather than inheriting a prior yes/no decision."
  status: normative
- id: ODTIS-0745
  keyword: SHOULD
  text: "Only assurance that is actually portable SHOULD be reused; non-portable assurance SHOULD trigger re-verification."
  status: normative
R-VC-Maturity-Gate:
- id: ODTIS-0735
  keyword: MUST
  text: "Adoption of an external credential standard MUST be gated by a declared maturity level; First Public Working Draft components MUST NOT be claimed for production national mandates."
  status: normative
- id: ODTIS-0736
  keyword: MUST
  text: "Each gated standard component MUST declare the Capa B controls (relying-party authentication, audit logging, rate limits, version pinning) required before production reliance."
  status: normative
- id: ODTIS-0737
  keyword: SHOULD
  text: "Ecosystems SHOULD run conformance labs and publish internal profiles before promoting a draft standard beyond pilot."
  status: normative
R-Public-eID:
- id: ODTIS-0739
  keyword: MUST
  text: "A relying party accepting multiple eIDs MUST publish an acceptance matrix mapping each issuer and assurance level to service tier and purpose."
  status: normative
- id: ODTIS-0740
  keyword: MUST
  text: "Authentication success MUST be distinguished from authorization or eligibility, and cross-border acceptance MUST declare an assurance mapping."
  status: normative
- id: ODTIS-0741
  keyword: SHOULD
  text: "Wrongful-rejection recourse and trust-event logging SHOULD be defined before multi-eID operation at scale."
  status: normative
R-Fraud-Orchestration:
- id: ODTIS-0747
  keyword: MUST
  text: "A fraud decision (block, step-up, hold, or refund) MUST be reconstructable as a trust-event chain linking KYC evidence, fraud signal, and where applicable the Verification of Payee result."
  status: normative
- id: ODTIS-0748
  keyword: MUST
  text: "Each fraud decision MUST record a liability owner and the legal basis for any cross-institution fraud-signal sharing."
  status: normative
- id: ODTIS-0749
  keyword: SHOULD
  text: "A recourse path SHOULD be defined for wrongful blocks as well as for fraud victims."
  status: normative
R-Stablecoin-CIP:
- id: ODTIS-0751
  keyword: MUST
  text: "A CIP reliance decision MUST record the verifying institution, proofing method, assurance level, and reliance type (direct verification versus institutional reliance)."
  status: normative
- id: ODTIS-0752
  keyword: MUST
  text: "Institutional reliance MUST reference an annual AML/CFT and CIP certification and MUST bind the decision to account-opening purpose."
  status: normative
- id: ODTIS-0753
  keyword: SHOULD
  text: "A protocol-agnostic credential presentation envelope and an identity-error recourse path SHOULD be supported."
  status: normative
R-Travel:
- id: ODTIS-0755
  keyword: MUST
  text: "A cross-border travel reliance decision MUST declare, per touchpoint, the relying party, purpose code, and allowed attribute set with an assurance-level mapping."
  status: normative
- id: ODTIS-0756
  keyword: MUST
  text: "Attribute reuse across touchpoints MUST be bounded by a declared reuse policy (one-time, session-bound, or journey-bound)."
  status: normative
- id: ODTIS-0757
  keyword: SHOULD
  text: "A recourse endpoint and cross-border recognition scope SHOULD be published per touchpoint."
  status: normative
R-CRA-Resilience:
- id: ODTIS-0759
  keyword: MUST
  text: "A software-supply-chain trust profile MUST attest manufacturer versus steward role and maintain SBOM provenance per release."
  status: normative
- id: ODTIS-0760
  keyword: MUST
  text: "Active-exploit and severe-incident events MUST be recorded as a trust-event chain with corrective-measure and regulator-filing references and timestamps."
  status: normative
- id: ODTIS-0761
  keyword: SHOULD
  text: "Post-market monitoring, a vulnerability-disclosure policy, and a component revocation path SHOULD be documented."
  status: normative
R-DPI-Resilience:
- id: ODTIS-0763
  keyword: MUST
  text: "A shared-infrastructure (DPI) trust profile MUST publish participant and relying-party authorization scoped per component, with blast-radius mapping of co-dependent services."
  status: normative
- id: ODTIS-0764
  keyword: MUST
  text: "A Trust Resilience Evidence Pack covering authorization, purpose, assurance, audit, revocation/step-up, recourse, and reporting MUST be maintained from pilot day one."
  status: normative
- id: ODTIS-0765
  keyword: SHOULD
  text: "Security and incident metrics SHOULD be reported transparently to partners, regulators, and the public."
  status: normative
R-Sovereign-Chain-Interop:
- id: ODTIS-0767
  keyword: MUST
  text: "Reliance on a sovereign or external identity-chain credential MUST document the chain operator accountability and issuer liability and revocation before mutual recognition."
  status: normative
- id: ODTIS-0768
  keyword: MUST NOT
  text: "Technical interoperability with an external identity chain MUST NOT be treated as institutional trust transfer; cross-jurisdiction acceptance MUST declare assurance mapping, purpose binding, and a recourse path."
  status: normative
R-LE-Biometric:
- id: ODTIS-0771
  keyword: MUST
  text: "A law-enforcement biometric reliance decision MUST record purpose, the alert-list authorizer, retention policy, and deployment class (overt or covert)."
  status: normative
- id: ODTIS-0772
  keyword: MUST
  text: "False-match mitigation and a citizen recourse path MUST be defined before operational use."
  status: normative
