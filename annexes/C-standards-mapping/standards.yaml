# ODTIS Annex C - External standards catalog
# Informative reference list; ODTIS does not claim certification under these frameworks.

spec_version: "0.9.0-draft"
source: "P18 2, normativa-estandares-referencia.md"

standards:
- id: STD-RFC2119
title: "Key words for use in RFCs to Indicate Requirement Levels"
reference: "RFC 2119 / RFC 8174"
uri: "https://www.rfc-editor.org/rfc/rfc2119"
domain: meta

- id: STD-OAUTH2
title: "OAuth 2.0 Authorization Framework"
reference: "RFC 6749"
uri: "https://www.rfc-editor.org/rfc/rfc6749"
domain: federation

- id: STD-OIDC-CORE
title: "OpenID Connect Core 1.0"
reference: "OIDC Core"
uri: "https://openid.net/specs/openid-connect-core-1_0.html"
domain: federation

- id: STD-OIDC-DISC
title: "OpenID Connect Discovery 1.0"
reference: "OIDC Discovery"
uri: "https://openid.net/specs/openid-connect-discovery-1_0.html"
domain: federation

- id: STD-PKCE
title: "Proof Key for Code Exchange"
reference: "RFC 7636"
uri: "https://www.rfc-editor.org/rfc/rfc7636"
domain: federation

- id: STD-JWT
title: "JSON Web Token"
reference: "RFC 7519"
uri: "https://www.rfc-editor.org/rfc/rfc7519"
domain: federation

- id: STD-TLS
title: "Transport Layer Security"
reference: "TLS 1.2+ (RFC 5246 / 8446)"
uri: "https://datatracker.ietf.org/doc/html/rfc8446"
domain: transport

- id: STD-WEBAUTHN
title: "Web Authentication (WebAuthn)"
reference: "W3C WebAuthn Level 2"
uri: "https://www.w3.org/TR/webauthn-2/"
domain: authentication

- id: STD-NIST-800-63-3
title: "Digital Identity Guidelines"
reference: "NIST SP 800-63-3"
uri: "https://pages.nist.gov/800-63-3/"
domain: assurance

- id: STD-NIST-800-207
title: "Zero Trust Architecture"
reference: "NIST SP 800-207"
uri: "https://csrc.nist.gov/publications/detail/sp/800-207/final"
domain: security

- id: STD-XROAD
title: "X-Road Security Architecture"
reference: "X-Road SS / central components"
uri: "https://docs.x-road.global/"
domain: exchange

- id: STD-EIDAS
title: "eIDAS Regulation (informative)"
reference: "EU 910/2014; eIDAS 2.0"
uri: "https://digital-strategy.ec.europa.eu/en/policies/eidas-regulation"
