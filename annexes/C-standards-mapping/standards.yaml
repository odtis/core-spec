note: "Design alignment only; no EU conformity claim"

- id: STD-EUDI-ARF
title: "EUDI Wallet Architecture Reference Framework"
reference: "European Commission ARF"
uri: "https://digital-strategy.ec.europa.eu/en/library/european-digital-identity-wallet-architecture-and-reference-framework"
domain: wallet
note: "Informative role mapping for Extended E-Wallet"

- id: STD-OID4VP
title: "OpenID for Verifiable Presentations"
reference: "OID4VP"
uri: "https://openid.net/specs/openid-4-verifiable-presentations-1_0.html"
domain: wallet

- id: STD-OID4VCI
title: "OpenID for Verifiable Credential Issuance"
reference: "OID4VCI"
uri: "https://openid.net/specs/openid-4-verifiable-credential-issuance-1_0.html"
domain: wallet

- id: STD-SD-JWT
title: "Selective Disclosure for JWTs"
reference: "SD-JWT VC"
uri: "https://datatracker.ietf.org/doc/draft-ietf-oauth-selective-disclosure-jwt/"
domain: wallet

- id: STD-PKI-RFC5280
title: "X.509 Public Key Infrastructure"
reference: "RFC 5280; CRL/OCSP practice"
uri: "https://www.rfc-editor.org/rfc/rfc5280"
domain: pki

- id: STD-OWASP
title: "OWASP Application Security"
reference: "OWASP Top 10 / ASVS (informative baseline)"
uri: "https://owasp.org/www-project-top-ten/"
domain: security

- id: STD-ISO27001
title: "Information security management"
reference: "ISO/IEC 27001 (operator target)"
uri: "https://www.iso.org/standard/27001"
domain: operator
note: "Phase 3-4 operator maturity target; not ODTIS conformance by itself"

- id: STD-GDPR
title: "General Data Protection Regulation (informative)"
reference: "EU GDPR principles"
uri: "https://gdpr-info.eu/"
domain: privacy
note: "Adopter legal layer; ODTIS encodes technical privacy controls"

- id: STD-ODTIS-PLATFORM
title: "VenID platform and operator model"
reference: "P01, P10, DS-07, Book 2"
uri: null
domain: platform
note: "Internal reference architecture; no external standard equivalent"

coverage_levels:
full: "ODTIS requirement implements the cited standard construct without material gaps"
partial: "ODTIS subset or operator policy completes the standard requirement"
informative: "Design alignment or disclosure aid; not a conformity claim"
platform: "Operator or deployment rule without direct external standard clause"
