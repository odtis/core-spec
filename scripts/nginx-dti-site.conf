# Nginx vhost for digitaltrustinfrastructure.org (static MkDocs site)
# Cloudflare SSL mode: Flexible — origin listens on HTTP port 80 only.
# Copy to EC2: /etc/nginx/sites-available/digitaltrustinfrastructure.org
# Enable: sudo ln -sf /etc/nginx/sites-available/digitaltrustinfrastructure.org /etc/nginx/sites-enabled/
# See DEPLOY-EC2-ODTIS-ORG.md for odtis.org (ODTIS spec site). This file is a separate vhost template for digitaltrustinfrastructure.org.

server {
    listen 80;
    listen [::]:80;
    server_name digitaltrustinfrastructure.org www.digitaltrustinfrastructure.org;

    root /var/www/digitaltrustinfrastructure.org;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
