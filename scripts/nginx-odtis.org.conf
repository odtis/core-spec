# Nginx vhost for odtis.org (static MkDocs site)
# Cloudflare SSL mode: Flexible — origin listens on HTTP port 80 only.
# Copy to EC2: /etc/nginx/sites-available/odtis.org
# Enable: sudo ln -sf /etc/nginx/sites-available/odtis.org /etc/nginx/sites-enabled/
# See DEPLOY-EC2-ODTIS-ORG.md (add alongside existing finnectos.com vhost)

server {
    listen 80;
    listen [::]:80;
    server_name odtis.org www.odtis.org;

    root /var/www/odtis.org;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
