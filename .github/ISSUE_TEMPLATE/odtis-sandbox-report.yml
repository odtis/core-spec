name: ODTIS sandbox conformance report
description: Implementation experience against ODTIS 0.9.0-draft
title: "[ODTIS sandbox] "
labels: ["odtis", "conformance", "sandbox"]
body:
  - type: input
    id: operator
    attributes:
      label: Operator / implementer
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Sandbox base URL (--target)
      placeholder: "https://idp.example/realms/venid"
    validations:
      required: true
  - type: checkboxes
    id: profiles
    attributes:
      label: Profiles claimed
      options:
        - label: core-identity
        - label: trust-network
        - label: federation
        - label: operator
        - label: extended
  - type: dropdown
    id: level
    attributes:
      label: Conformance level tested
      options:
        - L1
        - L2
        - L3
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Test results
      description: Paste L1/L2 output or attach conformance-statement.yaml
    validations:
      required: true
  - type: textarea
    id: gaps
    attributes:
      label: Gaps found
      description: Missing tests, spec ambiguities, Annex A issues
