name: ODTIS specification

on:
  push:
    branches: [main, setup/local-workspace]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync spec version
        run: python3 scripts/sync-spec-version.py --check
      - name: Validate registry
        run: python3 scripts/validate-registry.py
      - name: Validate section completeness
        run: python3 scripts/validate-section-completeness.py
      - name: Conformance L1/L2 structural suite
        run: ./conformance/run.sh

  build-site:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MkDocs
        run: pip install -r site/requirements.txt
      - name: Build static site
        run: ./scripts/build-site.sh
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: odtis-spec-site
          path: ../build/odtis-spec-site/

