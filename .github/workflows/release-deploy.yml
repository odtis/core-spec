name: Release and deploy site

on:
  push:
    branches: [main]

concurrency:
  group: odtis-release-deploy-main
  cancel-in-progress: false

jobs:
  release-deploy:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy safety check
        run: python3 scripts/check-deploy-safety.py

      - name: Make scripts executable
        run: chmod +x scripts/*.sh conformance/run.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump minor version
        id: bump
        run: |
          python3 scripts/bump-spec-version.py --minor --write
          echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Sync version across repository
        run: |
          python3 scripts/sync-spec-version.py
          python3 scripts/sync-site-release-meta.py
          python3 scripts/validate-section-completeness.py
        env:
          ODTIS_BUILD_SHA: ${{ github.sha }}
          ODTIS_BUILD_TIME: ${{ github.event.head_commit.timestamp }}

      - name: Install MkDocs
        run: pip install -r site/requirements.txt

      - name: Build static site
        env:
          ODTIS_BUILD_SHA: ${{ github.sha }}
          ODTIS_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: ./scripts/build-site.sh

      - name: Configure SSH for EC2 deploy
        env:
          ODTIS_SSH_KEY: ${{ secrets.ODTIS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$ODTIS_SSH_KEY" > ~/.ssh/odtis_deploy.pem
          echo >> ~/.ssh/odtis_deploy.pem
          chmod 600 ~/.ssh/odtis_deploy.pem
          ssh-keygen -y -f ~/.ssh/odtis_deploy.pem > /dev/null

      - name: Deploy to EC2
        env:
          ODTIS_EC2_HOST: ${{ secrets.ODTIS_EC2_HOST }}
          ODTIS_SSH_KEY: ~/.ssh/odtis_deploy.pem
          ODTIS_REMOTE_DIR: /var/www/odtis.org
        run: ./scripts/deploy-ec2.sh --skip-build

      - name: Commit release version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION site/mkdocs.yml site/BUILD-META.json index.md site/STATUS.md
          git add registry/ conformance/ traceability/ governance/ implementation/ spec/ publication/ annexes/
          if git diff --staged --quiet; then
            echo "No files to commit"
            exit 0
          fi
          git commit -m "chore(release): ODTIS $(tr -d '[:space:]' < VERSION) site deploy"
          git push
